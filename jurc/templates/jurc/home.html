<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JU Research Crawler{% endblock %}</title>
    
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">JU Research Crawler</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'author_search' %}">Author Search</a>
            <a class="nav-link" href="{% url 'teacher_list' %}">Faculty Directory</a>
        </div>
    </div>
  </nav>
  
  <div class="container mt-4">
    {% block content %}

    {% endblock %}
  </div>

  <footer class="footer fixed-bottom bg-primary">
    <div class="container text-center">
      <span class="text-white">
        <p>&copy; 2025 JU Research Crawler</p>
      </span>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
